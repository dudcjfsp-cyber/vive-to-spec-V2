services:
  - type: web
    name: vibe-to-spec-v2-managed-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run serve:managed-api
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MANAGED_API_PREFIX
        value: /api
      - key: MANAGED_API_ALLOWED_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
